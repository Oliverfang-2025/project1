<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="600" fill="#FEF2F2" />
  
  <!-- 质量管理系统图形 -->
  <g transform="translate(600, 300)">
    <!-- PDCA循环 -->
    <circle cx="0" cy="0" r="220" fill="none" stroke="#DC2626" stroke-width="15" />
    
    <!-- 分割线 -->
    <line x1="0" y1="-220" x2="0" y2="220" stroke="#DC2626" stroke-width="10" />
    <line x1="-220" y1="0" x2="220" y2="0" stroke="#DC2626" stroke-width="10" />
    
    <!-- PDCA文字 -->
    <text x="-110" y="-110" font-family="Arial" font-size="40" font-weight="bold" text-anchor="middle" fill="#B91C1C">P</text>
    <text x="110" y="-110" font-family="Arial" font-size="40" font-weight="bold" text-anchor="middle" fill="#B91C1C">D</text>
    <text x="110" y="110" font-family="Arial" font-size="40" font-weight="bold" text-anchor="middle" fill="#B91C1C">C</text>
    <text x="-110" y="110" font-family="Arial" font-size="40" font-weight="bold" text-anchor="middle" fill="#B91C1C">A</text>
    
    <!-- 中心IATF图标 -->
    <circle cx="0" cy="0" r="80" fill="#B91C1C" />
    <text x="0" y="15" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="white">IATF</text>
    <text x="0" y="45" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="white">16949</text>
  </g>
  
  <!-- 装饰元素 -->
  <rect x="50" y="50" width="150" height="150" rx="20" fill="#FCA5A5" opacity="0.6" />
  <rect x="1000" y="400" width="150" height="150" rx="20" fill="#FCA5A5" opacity="0.6" />
  
  <!-- 文字 - 可选 -->
  <text x="600" y="550" font-family="Arial" font-size="40" font-weight="bold" text-anchor="middle" fill="#B91C1C">质量管理体系</text>
</svg> 