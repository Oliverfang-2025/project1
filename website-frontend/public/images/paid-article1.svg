<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#FEF2F2" />
  
  <!-- 系统架构图案 -->
  <g transform="translate(400, 200)">
    <!-- 中央数据库图标 -->
    <rect x="-40" y="-50" width="80" height="100" rx="5" fill="#B91C1C" />
    <rect x="-30" y="-40" width="60" height="15" rx="2" fill="white" />
    <rect x="-30" y="-15" width="60" height="15" rx="2" fill="white" />
    <rect x="-30" y="10" width="60" height="15" rx="2" fill="white" />
    <rect x="-30" y="35" width="60" height="15" rx="2" fill="white" />
    
    <!-- 服务器/组件 -->
    <rect x="-180" y="-80" width="70" height="40" rx="5" fill="#EF4444" />
    <rect x="-180" y="0" width="70" height="40" rx="5" fill="#EF4444" />
    <rect x="-180" y="80" width="70" height="40" rx="5" fill="#EF4444" />
    
    <rect x="110" y="-80" width="70" height="40" rx="5" fill="#EF4444" />
    <rect x="110" y="0" width="70" height="40" rx="5" fill="#EF4444" />
    <rect x="110" y="80" width="70" height="40" rx="5" fill="#EF4444" />
    
    <!-- 连接线 -->
    <line x1="-110" y1="-60" x2="-40" y2="-30" stroke="#B91C1C" stroke-width="2" />
    <line x1="-110" y1="20" x2="-40" y2="0" stroke="#B91C1C" stroke-width="2" />
    <line x1="-110" y1="100" x2="-40" y2="30" stroke="#B91C1C" stroke-width="2" />
    
    <line x1="40" y1="-30" x2="110" y2="-60" stroke="#B91C1C" stroke-width="2" />
    <line x1="40" y1="0" x2="110" y2="20" stroke="#B91C1C" stroke-width="2" />
    <line x1="40" y1="30" x2="110" y2="100" stroke="#B91C1C" stroke-width="2" />
  </g>
  
  <!-- 装饰元素 -->
  <circle cx="150" cy="100" r="40" fill="#FCA5A5" opacity="0.6" />
  <circle cx="650" cy="300" r="50" fill="#FCA5A5" opacity="0.6" />
  
  <!-- 锁图标表示付费内容 -->
  <circle cx="680" cy="70" r="30" fill="#B91C1C" />
  <path d="M680 55 L680 75 M672 65 L688 65 M675 65 C675 60 680 55 685 60 C687 62 685 65 685 65" stroke="white" stroke-width="3" fill="none" />
  
  <!-- 标题 - 可选 -->
  <text x="400" y="350" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#B91C1C">高级系统架构设计</text>
</svg> 