<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- 背景 -->
  <rect width="256" height="256" fill="#ffffff" rx="16" ry="16"/>
  
  <!-- 二维码样式框架 -->
  <g transform="translate(32, 32)">
    <!-- 二维码外框 -->
    <rect x="0" y="0" width="192" height="192" fill="#07C160" opacity="0.1" rx="8" ry="8"/>
    
    <!-- 仿二维码图案 - 实际使用时可替换成真实的二维码图案 -->
    <!-- 这里用简化的方块图案模拟二维码效果 -->
    <g fill="#07C160">
      <!-- 左上角定位图案 -->
      <rect x="16" y="16" width="32" height="32" rx="4" ry="4"/>
      <rect x="24" y="24" width="16" height="16" fill="white" rx="2" ry="2"/>
      
      <!-- 右上角定位图案 -->
      <rect x="144" y="16" width="32" height="32" rx="4" ry="4"/>
      <rect x="152" y="24" width="16" height="16" fill="white" rx="2" ry="2"/>
      
      <!-- 左下角定位图案 -->
      <rect x="16" y="144" width="32" height="32" rx="4" ry="4"/>
      <rect x="24" y="152" width="16" height="16" fill="white" rx="2" ry="2"/>
      
      <!-- 中央星形图案，代表"星芯之火" -->
      <path d="M96,64 L103,86 L126,86 L107,99 L114,121 L96,108 L78,121 L85,99 L66,86 L89,86 Z" fill="#07C160"/>
      
      <!-- 随机数据点模拟二维码 -->
      <rect x="64" y="16" width="8" height="8" rx="1" ry="1"/>
      <rect x="80" y="16" width="8" height="8" rx="1" ry="1"/>
      <rect x="112" y="16" width="8" height="8" rx="1" ry="1"/>
      <rect x="16" y="64" width="8" height="8" rx="1" ry="1"/>
      <rect x="32" y="80" width="8" height="8" rx="1" ry="1"/>
      <rect x="64" y="64" width="8" height="8" rx="1" ry="1"/>
      <rect x="128" y="64" width="8" height="8" rx="1" ry="1"/>
      <rect x="144" y="80" width="8" height="8" rx="1" ry="1"/>
      <rect x="64" y="112" width="8" height="8" rx="1" ry="1"/>
      <rect x="80" y="128" width="8" height="8" rx="1" ry="1"/>
      <rect x="112" y="144" width="8" height="8" rx="1" ry="1"/>
      <rect x="144" y="144" width="8" height="8" rx="1" ry="1"/>
      <rect x="128" y="128" width="8" height="8" rx="1" ry="1"/>
      <rect x="112" y="112" width="8" height="8" rx="1" ry="1"/>
      <rect x="96" y="144" width="8" height="8" rx="1" ry="1"/>
      <rect x="64" y="144" width="8" height="8" rx="1" ry="1"/>
      <rect x="48" y="112" width="8" height="8" rx="1" ry="1"/>
      <rect x="32" y="128" width="8" height="8" rx="1" ry="1"/>
    </g>
  </g>
  
  <!-- 文本说明 -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#07C160" font-weight="bold">星芯之火</text>
</svg> 