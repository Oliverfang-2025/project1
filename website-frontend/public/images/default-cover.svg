<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="600" fill="#E0F2FE" />
  
  <!-- 装饰图案 -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 0 0 L 40 0 L 40 40 L 0 40 Z" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.3" />
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)" />
  
  <!-- 中心图形 -->
  <circle cx="600" cy="300" r="150" fill="#0369A1" />
  <text x="600" y="320" font-family="Arial" font-size="60" font-weight="bold" text-anchor="middle" fill="white">OF2088</text>
  
  <!-- 装饰元素 -->
  <circle cx="300" cy="150" r="80" fill="#0EA5E9" opacity="0.6" />
  <circle cx="900" cy="450" r="80" fill="#0EA5E9" opacity="0.6" />
  <circle cx="200" cy="500" r="40" fill="#0EA5E9" opacity="0.4" />
  <circle cx="1000" cy="200" r="40" fill="#0EA5E9" opacity="0.4" />
  
  <!-- 文字 - 可选 -->
  <text x="600" y="550" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle" fill="#0369A1">半导体/集成电路 专业知识分享</text>
</svg> 