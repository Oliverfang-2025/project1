<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#0EA5E9" />
  
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#grad1)" />
  
  <!-- 装饰图案 -->
  <path d="M0 50 Q200 0, 400 50 L400 0 L0 0 Z" fill="#0284C7" opacity="0.7" />
  <path d="M0 350 Q200 400, 400 350 L400 400 L0 400 Z" fill="#0284C7" opacity="0.7" />
  
  <!-- 头像轮廓 -->
  <circle cx="200" cy="180" r="100" fill="#F0F9FF" />
  
  <!-- 半导体/芯片风格的图案装饰 -->
  <rect x="150" y="130" width="100" height="100" rx="10" fill="#0EA5E9" />
  <line x1="150" y1="150" x2="250" y2="150" stroke="white" stroke-width="2" />
  <line x1="150" y1="170" x2="250" y2="170" stroke="white" stroke-width="2" />
  <line x1="150" y1="190" x2="250" y2="190" stroke="white" stroke-width="2" />
  <line x1="150" y1="210" x2="250" y2="210" stroke="white" stroke-width="2" />
  
  <line x1="170" y1="130" x2="170" y2="230" stroke="white" stroke-width="2" />
  <line x1="190" y1="130" x2="190" y2="230" stroke="white" stroke-width="2" />
  <line x1="210" y1="130" x2="210" y2="230" stroke="white" stroke-width="2" />
  <line x1="230" y1="130" x2="230" y2="230" stroke="white" stroke-width="2" />
  
  <!-- 名称 -->
  <text x="200" y="280" font-family="Arial" font-size="32" font-weight="bold" text-anchor="middle" fill="white">Oliver Fang</text>
  <text x="200" y="320" font-family="Arial" font-size="18" text-anchor="middle" fill="white">半导体/集成电路 生产管理专家</text>
</svg> 