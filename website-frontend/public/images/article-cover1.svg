<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#EEF2FF" />
  
  <!-- 抽象前端开发图案 -->
  <g transform="translate(400, 200)">
    <!-- HTML标签 -->
    <rect x="-150" y="-80" width="300" height="160" rx="10" fill="#6366F1" opacity="0.9" />
    
    <!-- 代码线条 -->
    <line x1="-120" y1="-50" x2="120" y2="-50" stroke="white" stroke-width="3" />
    <line x1="-120" y1="-20" x2="80" y2="-20" stroke="white" stroke-width="3" />
    <line x1="-120" y1="10" x2="100" y2="10" stroke="white" stroke-width="3" />
    <line x1="-120" y1="40" x2="60" y2="40" stroke="white" stroke-width="3" />
    
    <!-- HTML标记 -->
    <text x="-120" y="-70" font-family="monospace" font-size="18" fill="white">&lt;html&gt;</text>
    <text x="-100" y="70" font-family="monospace" font-size="18" fill="white">&lt;/html&gt;</text>
  </g>
  
  <!-- 装饰元素 -->
  <circle cx="120" cy="100" r="50" fill="#818CF8" opacity="0.6" />
  <circle cx="680" cy="300" r="60" fill="#818CF8" opacity="0.6" />
  
  <!-- 三角形装饰 -->
  <polygon points="50,300 100,200 150,300" fill="#4F46E5" opacity="0.7" />
  <polygon points="650,100 700,50 750,100" fill="#4F46E5" opacity="0.7" />
  
  <!-- 标题 - 可选 -->
  <text x="400" y="350" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#4338CA">前端开发最佳实践</text>
</svg> 