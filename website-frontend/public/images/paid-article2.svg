<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#FDF4FF" />
  
  <!-- 微服务架构图案 -->
  <g transform="translate(400, 200)">
    <!-- 微服务容器 -->
    <rect x="-250" y="-100" width="500" height="200" rx="10" fill="#F5F3FF" stroke="#C084FC" stroke-width="3" />
    
    <!-- 微服务模块 -->
    <g transform="translate(-180, -50)">
      <rect width="60" height="60" rx="5" fill="#A855F7" />
      <text x="30" y="35" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Auth</text>
    </g>
    
    <g transform="translate(-80, -50)">
      <rect width="60" height="60" rx="5" fill="#A855F7" />
      <text x="30" y="35" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">User</text>
    </g>
    
    <g transform="translate(20, -50)">
      <rect width="60" height="60" rx="5" fill="#A855F7" />
      <text x="30" y="35" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Order</text>
    </g>
    
    <g transform="translate(120, -50)">
      <rect width="60" height="60" rx="5" fill="#A855F7" />
      <text x="30" y="35" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Notify</text>
    </g>
    
    <!-- API网关 -->
    <rect x="-150" y="50" width="300" height="40" rx="5" fill="#9333EA" />
    <text x="0" y="75" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">API Gateway</text>
    
    <!-- 连接线 -->
    <line x1="-150" y1="-20" x2="-150" y2="50" stroke="#C084FC" stroke-width="2" />
    <line x1="-50" y1="-20" x2="-50" y2="50" stroke="#C084FC" stroke-width="2" />
    <line x1="50" y1="-20" x2="50" y2="50" stroke="#C084FC" stroke-width="2" />
    <line x1="150" y1="-20" x2="150" y2="50" stroke="#C084FC" stroke-width="2" />
  </g>
  
  <!-- 装饰元素 -->
  <circle cx="150" cy="100" r="40" fill="#DDD6FE" opacity="0.6" />
  <circle cx="650" cy="300" r="50" fill="#DDD6FE" opacity="0.6" />
  
  <!-- 锁图标表示付费内容 -->
  <circle cx="680" cy="70" r="30" fill="#9333EA" />
  <path d="M680 55 L680 75 M672 65 L688 65 M675 65 C675 60 680 55 685 60 C687 62 685 65 685 65" stroke="white" stroke-width="3" fill="none" />
  
  <!-- 标题 - 可选 -->
  <text x="400" y="350" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#9333EA">微服务实战指南</text>
</svg> 